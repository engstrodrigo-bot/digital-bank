<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Bank - BPartner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/lucide-static@0.321.0/font/lucide.min.css" rel="stylesheet">
    <style>
        body { background-color: black; color: white; font-family: sans-serif; }
        .gold-card {
            background: linear-gradient(135deg, #c6a24d 0%, #e9d191 45%, #9c7a2d 100%);
        }
    </style>
</head>
<body>
    <header class="flex items-center justify-between px-8 py-4 border-b border-zinc-900 bg-black sticky top-0 z-50">
        <div class="flex items-center gap-10">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-700 rounded-md flex items-center justify-center font-bold text-xl italic text-white">B</div>
                <span class="text-xl font-semibold tracking-tight text-white">Partner</span>
            </div>
            <nav class="hidden md:flex items-center gap-8 text-sm font-medium text-zinc-500">
                <a href="#" class="text-white border-b-2 border-red-600 pb-1">Painel</a>
                <a href="#" class="hover:text-white transition-colors">Contas</a>
                <a href="#" class="hover:text-white transition-colors">Transferências</a>
                <a href="#" class="hover:text-white transition-colors">Cartões</a>
                <a href="#" class="hover:text-white transition-colors">Menu</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 mr-4 text-right">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest block">JHON FELIX FERNANDES</span>
            </div>
            <button class="bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold hover:bg-zinc-200 transition-colors">
                Desconectar
            </button>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">
            <h2 class="text-lg font-semibold">Painel</h2>
            
            <div class="bg-zinc-950 border border-zinc-900 rounded-xl p-5">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-zinc-500 text-xs font-medium uppercase">Conta corrente</h3>
                    <i class="lucide-chevron-right w-4 h-4 text-zinc-700"></i>
                </div>
                <div class="text-white text-2xl font-bold">€ 0.10</div>
            </div>

            <div class="bg-zinc-950 border border-zinc-900 rounded-xl p-5">
                <div class="flex justify-between items-start mb-4">
                    <h3 class="text-zinc-500 text-xs font-medium uppercase">Conta multimoeda</h3>
                    <i class="lucide-chevron-right w-4 h-4 text-zinc-700"></i>
                </div>
                <div class="text-white text-2xl font-bold">€ 3.43</div>
            </div>

            <div class="gold-card relative h-52 w-full rounded-2xl p-6 shadow-2xl">
                <div class="absolute top-4 right-6 text-red-900 font-bold italic text-xl">B</div>
                <div class="mt-8">
                    <div class="w-10 h-8 bg-black/10 rounded-md border border-white/20 mb-4"></div>
                    <div class="text-amber-950 font-bold tracking-widest text-sm uppercase">JHON FELIX FERNANDES</div>
                    <div class="text-amber-950 text-xs font-medium mt-1">**** **** **** 3517</div>
                </div>
                <div class="absolute bottom-6 left-6 right-6 flex justify-between items-end">
                    <div class="text-[9px] text-amber-950 uppercase font-bold">EXPIRE NO FINAL 31-03-2031</div>
                    <div class="text-white font-black italic text-xl">VISA</div>
                </div>
                <div class="absolute top-4 right-4 bg-green-500/80 text-[10px] px-2 py-0.5 rounded-full text-white font-bold uppercase">Ativo</div>
            </div>
        </div>

        <div class="lg:col-span-8 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <h2 class="text-lg font-semibold">Taxas de câmbio</h2>
                    <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 flex items-center justify-between">
                        <div>
                            <div class="text-2xl font-bold text-white">1.00</div>
                            <p class="text-[10px] text-zinc-600 uppercase mt-1">EUR</p>
                        </div>
                        <i class="lucide-refresh-cw text-zinc-700 w-5 h-5"></i>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-zinc-400">1.08</div>
                            <p class="text-[10px] text-zinc-600 uppercase mt-1">USD</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-semibold">Fluxo de caixa</h2>
                    <div class="flex gap-4 text-[10px] uppercase font-bold">
                        <span class="flex items-center gap-1 text-green-500"><div class="w-2 h-2 bg-green-600 rounded-sm"></div> Entradas</span>
                        <span class="flex items-center gap-1 text-red-500"><div class="w-2 h-2 bg-red-600 rounded-sm"></div> Saídas</span>
                    </div>
                </div>
                <div class="bg-zinc-950 border border-zinc-900 rounded-xl p-6 h-64 flex items-end justify-between gap-4">
                    <div class="flex-1 flex flex-col items-center gap-2">
                        <div class="flex items-end gap-1 h-32">
                            <div class="w-2 bg-green-600 rounded-t-sm h-12"></div>
                            <div class="w-2 bg-red-600 rounded-t-sm h-8"></div>
                        </div>
                        <span class="text-[10px] text-zinc-600 uppercase">Jan</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2">
                        <div class="flex items-end gap-1 h-32">
                            <div class="w-2 bg-green-600 rounded-t-sm h-full"></div>
                            <div class="w-2 bg-red-600 rounded-t-sm h-4/5"></div>
                        </div>
                        <span class="text-[10px] text-zinc-600 uppercase">Março</span>
                    </div>
                    <div class="flex-1 flex flex-col items-center gap-2">
                        <div class="flex items-end gap-1 h-32">
                            <div class="w-2 bg-green-600 rounded-t-sm h-6"></div>
                            <div class="w-2 bg-red-600 rounded-t-sm h-4"></div>
                        </div>
                        <span class="text-[10px] text-zinc-600 uppercase">Abr</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Inicializa ícones lucide
        lucide.createIcons();
    </script>
</body>
</html>
